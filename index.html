<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tsurugi Scroll — DFIR · Malware · Threat Hunting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── CSS Variables — Tsurugi Cinematic Palette ──────── */
:root{
  /* Backgrounds — deep charcoal blacks from screenshot */
  --bg0:#0e0c0b;--bg1:#141210;--bg2:#1a1714;--bg3:#201d19;
  /* Borders — subtle warm stone edges */
  --border:#2e2a24;--border2:#252118;
  /* Text — bone whites and warm grays */
  --text1:#e8e0d0;--text2:#b8ad9e;--text3:#7a6e60;--text4:#3d3830;
  /* Accent — ember red from the warrior's glowing eye */
  --accent:#c0392b;--accent2:#e07b39;
  /* Secondary warm tones */
  --accent3:#d4aa70;--accent4:#8b1a1a;
  --scrollbar:#3d3830;
  --card-hover-shadow:rgba(0,0,0,.65);
  --input-bg:#1a1714;
  /* Grain overlay */
  --grain:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
}
[data-theme="light"]{
  --bg0:#f5f0e8;--bg1:#faf6ef;--bg2:#f0ebe0;--bg3:#e8e0d0;
  --border:#c8bfaa;--border2:#d8d0be;
  --text1:#1a1410;--text2:#3d3020;--text3:#7a6040;--text4:#a89070;
  --scrollbar:#a09080;
  --card-hover-shadow:rgba(0,0,0,.15);
  --input-bg:#faf6ef;
}

/* ── Reset ──────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg1);color:var(--text2);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;transition:background .2s,color .2s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
input,button,select{font-family:'Inter',sans-serif}
input:focus,select:focus{outline:none}
button{cursor:pointer;border:none;background:none}
pre,code,.mono{font-family:'JetBrains Mono',monospace}
pre{white-space:pre-wrap;word-break:break-all}

/* ── Animations ─────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes emberPulse{0%,100%{box-shadow:0 0 6px rgba(192,57,43,.35)}50%{box-shadow:0 0 18px rgba(192,57,43,.6),0 0 4px rgba(224,123,57,.4)}}
.fade-in{animation:fadeUp .25s ease both}

/* ── Top bar ────────────────────────────────────────── */
#topbar{
  position:sticky;top:0;z-index:300;
  background:var(--bg0);
  border-bottom:1px solid var(--border2);
  /* Subtle ember gradient across top edge */
  box-shadow:0 1px 0 rgba(192,57,43,.2),0 2px 20px rgba(0,0,0,.4);
  padding:0 20px;height:50px;
  display:flex;align-items:center;gap:12px;
}
/* Thin ember line at very top */
#topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);
  opacity:.5;
}
.logo-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  animation:emberPulse 2.8s infinite;
  flex-shrink:0;
}
.logo-text{
  font-family:'Cinzel',serif;font-weight:700;font-size:14px;
  letter-spacing:2px;color:var(--text1);text-transform:uppercase;
}
.logo-sub{
  color:var(--text4);font-size:10px;font-family:'JetBrains Mono',monospace;
  padding-left:10px;border-left:1px solid var(--border2);
  letter-spacing:1px;text-transform:uppercase;
}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.stat-pill{
  font-size:10px;color:var(--text4);display:flex;align-items:center;gap:4px;
  font-family:'JetBrains Mono',monospace;
}
.stat-pill b{font-weight:700;color:var(--accent3)}
.topbar-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0}
.tb-btn{
  display:flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:3px;font-size:14px;
  color:var(--text3);border:1px solid transparent;
  transition:background .15s,color .15s,border-color .15s;
  position:relative;
}
.tb-btn:hover{background:var(--bg2);border-color:var(--border);color:var(--text1)}
.tb-btn.active{background:var(--bg2);border-color:var(--accent);color:var(--accent)}
.bm-badge{
  position:absolute;top:2px;right:2px;
  min-width:14px;height:14px;border-radius:7px;
  background:var(--accent);color:#fff;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 3px;
  font-family:'JetBrains Mono',monospace;
}
#version-badge{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;
  padding:2px 8px;border-radius:2px;letter-spacing:1px;
  background:rgba(192,57,43,.1);color:rgba(208,100,80,.7);
  border:1px solid rgba(192,57,43,.25);
}

/* ── Tab bar ────────────────────────────────────────── */
#tabbar{
  position:sticky;top:50px;z-index:200;
  background:var(--bg0);border-bottom:1px solid var(--border2);
  display:flex;overflow-x:auto;padding:0 18px;
  scrollbar-width:thin;scrollbar-color:var(--scrollbar) transparent;
  white-space:nowrap;
}
#tabbar::-webkit-scrollbar{height:2px}
.tab{
  padding:10px 14px;font-size:10px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;
  color:var(--text4);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;
  transition:color .15s,border-color .15s;
  font-family:'Inter',sans-serif;
}
.tab.active{color:var(--tc,#c0392b);border-bottom-color:var(--tc,#c0392b)}
.tab:hover:not(.active){color:var(--text3)}

/* ── Layout ─────────────────────────────────────────── */
#content{min-height:calc(100vh - 96px)}
.wrap{max-width:1400px;margin:0 auto;padding:28px 24px}
.wrap-sm{max-width:900px;margin:0 auto;padding:28px 24px}

/* ── Search ─────────────────────────────────────────── */
.searchbox{position:relative}
.searchbox .icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:15px;color:var(--accent3);pointer-events:none;line-height:1;
}
.searchbox input{
  width:100%;background:var(--input-bg);
  border:1px solid var(--border);border-radius:2px;
  padding:12px 14px 12px 42px;color:var(--text1);font-size:14px;
  font-family:'Inter',sans-serif;letter-spacing:.2px;
  transition:border-color .2s,box-shadow .2s;
}
.searchbox input:focus{
  border-color:rgba(192,57,43,.5);
  box-shadow:0 0 0 3px rgba(192,57,43,.08),inset 0 0 0 1px rgba(192,57,43,.1);
}
.searchbox input::placeholder{color:var(--text4)}
.kbd-hint{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:10px;color:var(--text4);font-family:'JetBrains Mono',monospace;
  background:var(--bg2);border:1px solid var(--border);border-radius:2px;padding:1px 6px;
  pointer-events:none;letter-spacing:.5px;
}

/* ── Filter bar ─────────────────────────────────────── */
.filterbar{
  background:var(--bg3);border:1px solid var(--border);border-radius:2px;
  padding:14px 16px;margin-bottom:20px;
}
.filter-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:8px}
.filter-row:last-child{margin-bottom:0}
.filter-label{
  font-size:9px;font-weight:600;letter-spacing:2px;color:var(--text4);
  min-width:92px;flex-shrink:0;text-transform:uppercase;
  font-family:'Inter',sans-serif;
}
.chip{
  padding:3px 10px;border-radius:2px;font-size:10px;font-weight:600;
  cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text4);
  transition:background .1s,color .1s,border-color .1s;white-space:nowrap;
  letter-spacing:.3px;font-family:'Inter',sans-serif;
}
.chip.on{background:var(--cc,rgba(192,57,43,.18));color:var(--cl,#c0392b);border-color:var(--cb,rgba(192,57,43,.45))}
.clear-btn{
  font-size:10px;padding:3px 10px;
  border:1px solid rgba(192,57,43,.4);
  color:var(--accent);border-radius:2px;background:rgba(192,57,43,.08);
  white-space:nowrap;letter-spacing:.3px;
}

/* ── Grids ──────────────────────────────────────────── */
.grid-tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.grid-cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.grid-rb{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}

/* ── Cat Card ───────────────────────────────────────── */
.cat-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-top:2px solid var(--cc);
  border-radius:2px;padding:16px;cursor:pointer;
  transition:transform .2s,box-shadow .2s,background .15s;
  position:relative;overflow:hidden;
}
.cat-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 60%);
  pointer-events:none;
}
.cat-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px var(--card-hover-shadow),0 0 0 1px var(--cc);
  background:var(--bg3);
}
.cat-count{
  display:inline-block;padding:2px 7px;border-radius:1px;
  font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;
  letter-spacing:.5px;
}

/* ── Tool Card ──────────────────────────────────────── */
.tool-card{
  background:var(--bg2);border:1px solid var(--border);
  border-left:2px solid var(--cc);
  border-radius:2px;padding:13px 14px;cursor:pointer;
  display:flex;flex-direction:column;gap:6px;
  transition:border-color .15s,box-shadow .15s,background .15s;
  position:relative;
}
.tool-card:hover{
  border-color:var(--cc);background:var(--bg3);
  box-shadow:0 0 0 1px var(--cc),0 4px 20px var(--card-hover-shadow);
}
.tool-card:focus{outline:2px solid var(--cc);outline-offset:1px}
.bm-star{
  position:absolute;top:10px;right:10px;font-size:12px;
  color:var(--text4);background:none;border:none;
  transition:color .15s,transform .15s;line-height:1;padding:2px;
}
.bm-star:hover{color:var(--accent3);transform:scale(1.2)}
.bm-star.starred{color:var(--accent3)}

/* ── Status badges ──────────────────────────────────── */
.badge-oss{
  display:inline-block;padding:1px 5px;border-radius:1px;
  font-size:8px;font-weight:700;letter-spacing:.5px;
  font-family:'JetBrains Mono',monospace;text-transform:uppercase;
  background:rgba(160,130,80,.12);color:#b09050;border:1px solid rgba(160,130,80,.25);
}
.badge-com{
  display:inline-block;padding:1px 5px;border-radius:1px;
  font-size:8px;font-weight:700;letter-spacing:.5px;
  font-family:'JetBrains Mono',monospace;text-transform:uppercase;
  background:rgba(192,57,43,.1);color:#a04030;border:1px solid rgba(192,57,43,.25);
}

/* ── Tags ───────────────────────────────────────────── */
.tag{
  display:inline-flex;align-items:center;padding:2px 7px;border-radius:1px;
  font-size:9px;font-weight:600;letter-spacing:.5px;
  font-family:'JetBrains Mono',monospace;white-space:nowrap;text-transform:uppercase;
}

/* ── Runbook cards ──────────────────────────────────── */
.rb-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:2px;
  padding:20px;cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s;
}
.rb-card:hover{
  border-color:var(--accent2);background:var(--bg3);
  box-shadow:0 0 24px rgba(224,123,57,.1),0 0 0 1px rgba(224,123,57,.2);
}
.rb-step{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--bg3);border:1px solid var(--border);border-radius:2px;
  padding:14px 16px;margin-bottom:8px;
  transition:border-color .15s;
}
.rb-step:last-child{margin-bottom:0}
.rb-step:hover{border-color:var(--border2)}
.step-num{
  width:26px;height:26px;border-radius:2px;
  border:1px solid var(--accent2);
  color:var(--accent2);display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0;
}

/* ── Bookmarks panel ────────────────────────────────── */
#bm-panel{
  position:fixed;top:50px;right:0;bottom:0;width:320px;
  background:var(--bg0);border-left:1px solid var(--border);
  z-index:250;transform:translateX(100%);transition:transform .22s ease;
  display:flex;flex-direction:column;overflow:hidden;
}
#bm-panel.open{transform:translateX(0)}
#bm-panel-head{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#bm-panel-body{flex:1;overflow-y:auto;padding:12px}
.bm-tool-row{
  display:flex;align-items:center;gap:8px;padding:9px 10px;
  background:var(--bg2);border:1px solid var(--border);border-radius:2px;
  margin-bottom:6px;cursor:pointer;transition:border-color .12s;
}
.bm-tool-row:hover{border-color:var(--accent)}
.bm-remove{color:var(--text4);font-size:11px;margin-left:auto;flex-shrink:0;padding:2px 5px}
.bm-remove:hover{color:var(--accent)}

/* ── Kbd nav highlight ──────────────────────────────── */
.kbd-focused{outline:2px solid var(--accent) !important;outline-offset:1px}

/* ── Modal ──────────────────────────────────────────── */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(8,6,5,.93);backdrop-filter:blur(4px);
  z-index:1000;align-items:center;justify-content:center;padding:16px;
}
#overlay.open{display:flex}
#modal{
  background:var(--bg2);
  border:1px solid var(--border);
  border-top:2px solid var(--accent);
  border-radius:2px;
  width:100%;max-width:820px;max-height:92vh;overflow-y:auto;
  padding:30px;position:relative;animation:fadeUp .2s ease;
  box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 40px rgba(192,57,43,.08);
}
#modal::-webkit-scrollbar{width:3px}
.modal-close{
  position:absolute;top:14px;right:16px;font-size:18px;
  color:var(--text4);transition:color .15s;
}
.modal-close:hover{color:var(--text1)}
.modal-sec{
  background:var(--bg3);border:1px solid var(--border);border-radius:2px;
  padding:14px 16px;margin-top:12px;
}
.modal-sec-title{
  font-size:9px;font-weight:600;letter-spacing:2px;margin-bottom:8px;
  text-transform:uppercase;font-family:'Inter',sans-serif;
}

/* ── Hero ───────────────────────────────────────────── */
#hero{
  text-align:center;padding:60px 24px 36px;
  max-width:800px;margin:0 auto;
  position:relative;
}
/* Decorative diagonal lines behind hero */
#hero::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(
      -45deg,
      transparent,transparent 40px,
      rgba(192,57,43,.015) 40px,rgba(192,57,43,.015) 41px
    );
  pointer-events:none;
}
.hero-rule{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
.hero-rule span{
  font-size:9px;font-weight:600;letter-spacing:4px;
  color:rgba(192,57,43,.5);text-transform:uppercase;
  font-family:'Inter',sans-serif;
}
.hero-rule div{height:1px;width:50px;background:linear-gradient(90deg,transparent,rgba(192,57,43,.4))}
.hero-rule div:last-child{background:linear-gradient(270deg,transparent,rgba(192,57,43,.4))}
.hero-title{
  font-family:'Cinzel',serif;font-size:42px;font-weight:900;
  letter-spacing:-.5px;line-height:1.05;color:var(--text1);margin-bottom:8px;
  text-shadow:0 2px 30px rgba(0,0,0,.5);
}
.hero-title em{font-style:normal;color:var(--accent3)}
.hero-sub{
  color:var(--text4);font-size:12px;line-height:1.7;margin-bottom:28px;
  font-family:'Inter',sans-serif;letter-spacing:.3px;
}

/* ── Sec label ──────────────────────────────────────── */
.sec-lbl{
  font-size:9px;font-weight:600;letter-spacing:2.5px;color:var(--text4);
  margin-bottom:14px;text-transform:uppercase;font-family:'Inter',sans-serif;
}
.divider{height:1px;background:var(--border2);margin:24px 0}

/* ── Empty ──────────────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--text4)}
.empty .ico{font-size:30px;margin-bottom:12px;opacity:.5}

/* ── Kbd shortcut legend ────────────────────────────── */
.kbd{
  display:inline-block;padding:1px 6px;border-radius:2px;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  background:var(--bg3);border:1px solid var(--border);color:var(--text3);
}

/* ── Runbook back bar ───────────────────────────────── */
.rb-breadcrumb{
  background:var(--bg0);border-bottom:1px solid var(--border);
  padding:11px 22px;display:flex;align-items:center;gap:10px;
  font-size:11px;color:var(--text4);font-family:'Inter',sans-serif;
  letter-spacing:.3px;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo-dot"></div>
  <span class="logo-text">Tsurugi Scroll</span>
  <span class="logo-sub">DFIR · Malware · Threat Hunting</span>
  <div class="topbar-right">
    <span class="stat-pill"><b id="stat-tools" style="color:var(--accent)">—</b>&nbsp;tools</span>
    <span class="stat-pill"><b id="stat-cats" style="color:var(--accent3)">—</b>&nbsp;cats</span>
    <div class="topbar-sep"></div>
    <span id="version-badge">LAB · 2024.1</span>
    <div class="topbar-sep"></div>
    <!-- Bookmarks -->
    <button class="tb-btn" id="bm-toggle" title="Bookmarks (B)">
      ★<span class="bm-badge" id="bm-count" style="display:none">0</span>
    </button>
    <!-- Nebula -->
    <button class="tb-btn" id="nebula-btn" title="3D Knowledge Nebula" onclick="window.open('nebula.html','_blank')" style="font-size:12px">🌐</button>
    <!-- Dark/light mode -->
    <button class="tb-btn" id="theme-toggle" title="Toggle light/dark mode (T)">🌙</button>
    <!-- Keyboard shortcuts help -->
    <button class="tb-btn" id="kbd-help-btn" title="Keyboard shortcuts (?)">⌨</button>
  </div>
</div>

<!-- TAB BAR -->
<div id="tabbar"></div>

<!-- MAIN CONTENT -->
<div id="content"></div>

<!-- BOOKMARKS PANEL -->
<div id="bm-panel">
  <div id="bm-panel-head">
    <span style="font-family:'Cinzel',serif;font-weight:700;font-size:12px;color:var(--accent3);letter-spacing:1px;text-transform:uppercase">Bookmarks</span>
    <div style="display:flex;gap:6px">
      <button id="bm-clear-all" style="font-size:9px;padding:3px 8px;color:var(--text4);border:1px solid var(--border);border-radius:2px;background:none;letter-spacing:.5px;text-transform:uppercase;font-family:'Inter',sans-serif">Clear all</button>
      <button id="bm-close" style="color:var(--text4);font-size:18px;line-height:1">✕</button>
    </div>
  </div>
  <div id="bm-panel-body"></div>
</div>

<!-- MODAL -->
<div id="overlay">
  <div id="modal"></div>
</div>

<!-- KBD HELP MODAL -->
<div id="kbd-overlay" style="display:none;position:fixed;inset:0;background:rgba(8,6,5,.93);backdrop-filter:blur(4px);z-index:2000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:2px;width:100%;max-width:480px;padding:28px;animation:fadeUp .18s ease;box-shadow:0 24px 80px rgba(0,0,0,.7)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h3 style="font-size:13px;font-weight:700;color:var(--text1);font-family:'Cinzel',serif;letter-spacing:2px;text-transform:uppercase">Keyboard Shortcuts</h3>
      <button id="kbd-close" style="color:var(--text4);font-size:18px;line-height:1">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;color:var(--text3)">
      <div class="kbd-row"><span class="kbd">/</span> &nbsp;Focus search</div>
      <div class="kbd-row"><span class="kbd">Esc</span> &nbsp;Close / clear</div>
      <div class="kbd-row"><span class="kbd">↑</span><span class="kbd">↓</span> &nbsp;Navigate cards</div>
      <div class="kbd-row"><span class="kbd">Enter</span> &nbsp;Open tool</div>

// ── Helpers ──────────────────────────────────────────────────────────────────
const ALL_CATS = Object.keys(CAT);

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function hex2rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}
function catColor(cat){return CAT[cat]?.c||'#c0392b'}
function makeTag(label,color,size=10){
  return `<span class="tag" style="background:${hex2rgba(color,.13)};color:${color};border:1px solid ${hex2rgba(color,.32)};font-size:${size}px">${esc(label)}</span>`;
}
function makeChip(label,on,color,ftype,val){
  const style = on ? `style="--cc:${hex2rgba(color,.18)};--cl:${color};--cb:${hex2rgba(color,.5)}"` : '';
  return `<button class="chip${on?' on':''} filter-chip" data-ftype="${esc(ftype)}" data-val="${esc(val)}" ${style}>${esc(label)}</button>`;
}
function statusBadge(oss){
  return oss
    ? '<span class="badge-oss">OSS</span>'
    : '<span class="badge-com">COMM</span>';
}

// ── State ────────────────────────────────────────────────────────────────────
let activeTab    = '__home__';
let activeRb     = null;
let gSearch      = '';
let cSearch      = '';
let fSubcat      = [];
let fType        = [];
let fEv          = [];
let bookmarks    = JSON.parse(localStorage.getItem('ts_bookmarks')||'[]');
let kbdIdx       = -1;
let kbdCards     = [];

// ── Bookmarks helpers ────────────────────────────────────────────────────────
function saveBm(){localStorage.setItem('ts_bookmarks',JSON.stringify(bookmarks))}
function isStarred(name){return bookmarks.includes(name)}
function toggleBm(name,e){
  if(e){e.stopPropagation();e.preventDefault()}
  bookmarks = isStarred(name) ? bookmarks.filter(x=>x!==name) : [...bookmarks,name];
  saveBm(); updateBmBadge(); renderBmPanel();
  // update star in current view without full re-render
  document.querySelectorAll(`[data-tool="${CSS.escape(name)}"] .bm-star`).forEach(s=>{
    s.classList.toggle('starred', isStarred(name));
    s.textContent = isStarred(name) ? '★' : '☆';
  });
}
function updateBmBadge(){
  const badge = document.getElementById('bm-count');
  badge.textContent = bookmarks.length;
  badge.style.display = bookmarks.length ? 'flex' : 'none';
}
function renderBmPanel(){
  const body = document.getElementById('bm-panel-body');
  if(!bookmarks.length){
    body.innerHTML = '<div class="empty" style="padding:32px 10px"><div class="ico">☆</div><div style="font-size:12px">No bookmarks yet.<br>Click ☆ on any tool card.</div></div>';
    return;
  }
  body.innerHTML = bookmarks.map(name=>{
    const t = TOOLS.find(x=>x.n===name);
    if(!t) return '';
    const cc = catColor(t.c);
    return `<div class="bm-tool-row" data-bm-tool="${esc(name)}">
      <span style="font-size:16px">${CAT[t.c]?.i||'🔧'}</span>
      <div style="flex:1;min-width:0">
        <div class="mono" style="color:${cc};font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(name)}</div>
        <div style="font-size:10px;color:var(--text4);margin-top:2px">${esc(t.c)}${t.sub?' · '+esc(t.sub):''}</div>
      </div>
      <button class="bm-remove" data-bm-rm="${esc(name)}">✕</button>
    </div>`;
  }).join('');
  body.querySelectorAll('[data-bm-tool]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.dataset.bmRm) return;
    openModal(el.dataset.bmTool);
  }));
  body.querySelectorAll('[data-bm-rm]').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    bookmarks=bookmarks.filter(x=>x!==btn.dataset.bmRm);
    saveBm(); updateBmBadge(); renderBmPanel();
    document.querySelectorAll(`[data-tool="${CSS.escape(btn.dataset.bmRm)}"] .bm-star`).forEach(s=>{
      s.classList.remove('starred'); s.textContent='☆';
    });
  }));
}

// ── Theme ────────────────────────────────────────────────────────────────────
let theme = localStorage.getItem('ts_theme')||'dark';
function applyTheme(t){
  theme=t;
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-toggle').textContent = t==='dark' ? '🌙' : '☀️';
  localStorage.setItem('ts_theme',t);
}
applyTheme(theme);

// ── Tab bar ──────────────────────────────────────────────────────────────────
function buildTabs(){
  const tabs=[{id:'__home__',label:'🏠 Home',tc:'var(--accent)'},
    ...ALL_CATS.map(c=>({id:c,label:`${CAT[c].i} ${c}`,tc:CAT[c].c})),
    {id:'__runbooks__',label:'📚 Runbooks',tc:'var(--accent2)'}
  ];
  document.getElementById('tabbar').innerHTML = tabs.map(t=>
    `<button class="tab${activeTab===t.id?' active':''}" data-tid="${esc(t.id)}" style="--tc:${t.tc}">${esc(t.label)}</button>`
  ).join('');
  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>goTab(b.dataset.tid)));
}

function goTab(id){
  activeTab=id; activeRb=null; cSearch=''; fSubcat=[]; fType=[]; fEv=[];
  buildTabs(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goTabFiltered(id,sub){
  activeTab=id; activeRb=null; cSearch=''; fSubcat=sub?[sub]:[]; fType=[]; fEv=[];
  buildTabs(); render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Render dispatcher ────────────────────────────────────────────────────────
function render(){
  kbdIdx=-1; kbdCards=[];
  const el=document.getElementById('content');
  el.style.opacity='0';
  setTimeout(()=>{
    if(activeTab==='__home__') el.innerHTML=renderHome();
    else if(activeTab==='__runbooks__') el.innerHTML= activeRb ? renderRbDetail() : renderRbList();
    else el.innerHTML=renderCat(activeTab);
    el.style.cssText='opacity:1;transition:opacity .18s';
    bindEvents();
    updateKbdCards();
  },55);
}

        ${results.length?`<div class="grid-tools">${results.map(toolCard).join('')}</div>`

// ── CATEGORY VIEW ─────────────────────────────────────────────────────────────
function renderCat(cat){
  const m=CAT[cat],cc=m.c;
  const all=TOOLS.filter(t=>t.c===cat);
  const subcats=(SUBCATS[cat]||[]).slice().sort();
  const types=[...new Set(all.map(t=>t.t||'CLI'))].filter(Boolean).sort();
  const evPresent=[...new Set(all.flatMap(t=>t.ev||[]))].filter(e=>EV_TYPES.includes(e));

  let shown=all;
  if(fSubcat.length) shown=shown.filter(t=>fSubcat.includes(t.sub));
  if(fType.length)   shown=shown.filter(t=>fType.includes(t.t||'CLI'));
  if(fEv.length)     shown=shown.filter(t=>t.ev&&t.ev.some(e=>fEv.includes(e)));
  if(cSearch.trim()){const q=cSearch.trim().toLowerCase();shown=shown.filter(t=>t.n.toLowerCase().includes(q)||(t.p||'').toLowerCase().includes(q)||(t.s||'').toLowerCase().includes(q))}

  const activeFilters=fSubcat.length+fType.length+fEv.length;

  const subcatRow=subcats.length>1?`<div class="filter-row"><span class="filter-label">Subcategory</span>${subcats.map(s=>makeChip(s,fSubcat.includes(s),cc,'sub',s)).join('')}</div>`:'';
  const typeRow=types.length>1?`<div class="filter-row"><span class="filter-label">Type</span>${types.map(tp=>makeChip(tp,fType.includes(tp),'#b89050','type',tp)).join('')}</div>`:'';
  const evRow=evPresent.length?`<div class="filter-row"><span class="filter-label">Evidence</span>${evPresent.map(e=>makeChip(e,fEv.includes(e),'#a07050','ev',e)).join('')}</div>`:'';

  return `
    <div class="wrap">
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border2)">
        <span style="font-size:28px;line-height:1;flex-shrink:0;margin-top:2px">${m.i}</span>
        <div style="flex:1">
          <h2 style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:${cc};letter-spacing:.5px;margin-bottom:4px">${esc(cat)}</h2>
          <p style="font-size:11px;color:var(--text4);font-family:'Inter',sans-serif">${esc(m.d)} &nbsp;·&nbsp; <span style="color:${cc}">${shown.length}</span>${shown.length!==all.length?` of ${all.length}`:''} tools</p>
        </div>
      </div>
      <div class="filterbar">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:${subcats.length>1||types.length>1||evPresent.length?'10px':'0'}">
          <div class="searchbox" style="flex:1">
            <span class="icon" style="font-size:14px">⌕</span>
            <input id="c-search" placeholder="Filter within ${esc(cat)}…" value="${esc(cSearch)}" style="padding-top:9px;padding-bottom:9px;font-size:12px">
          </div>
          ${activeFilters?`<button id="clr-filters" class="clear-btn">✕ Clear ${activeFilters}</button>`:''}
        </div>
        ${subcatRow}${typeRow}${evRow}
      </div>
      ${shown.length?`<div class="grid-tools fade-in" id="tool-grid">${shown.map(toolCard).join('')}</div>`
        :`<div class="empty"><div class="ico">🔍</div><div style="font-size:12px;font-family:'Inter',sans-serif">No tools match the active filters.</div></div>`}
    </div>`;
}

// ── TOOL CARD ─────────────────────────────────────────────────────────────────
function toolCard(t){
  const cc=catColor(t.c);
  const starred=isStarred(t.n);
  return `<div class="tool-card" data-tool="${esc(t.n)}" style="--cc:${cc}" tabindex="0">
    <div style="display:flex;align-items:flex-start;gap:6px;padding-right:24px">
      <span class="mono" style="color:${cc};font-weight:600;font-size:12px;line-height:1.3;flex:1;letter-spacing:.2px">${esc(t.n)}</span>
      <div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0;margin-top:1px">
        ${makeTag(t.t||'CLI',cc,8)}
        ${statusBadge(t.oss)}
      </div>
    </div>
    ${t.p?`<p style="font-size:11px;color:var(--text3);line-height:1.5;font-family:'Inter',sans-serif">${esc(t.p)}</p>`:''}
    ${t.sub?`<div style="font-size:9px;color:var(--text4);font-family:'JetBrains Mono',monospace;letter-spacing:.5px">${esc(t.sub)}</div>`:''}
    <button class="bm-star${starred?' starred':''}" data-star="${esc(t.n)}" title="Bookmark">${starred?'★':'☆'}</button>
  </div>`;
}

              <div style="font-weight:600;font-size:13px;color:var(--text1);margin-bottom:5px;letter-spacing:.2px">${esc(rb.title)}</div>
              <p style="font-size:11px;color:var(--text4);line-height:1.6;margin-bottom:10px;font-family:'Inter',sans-serif">${esc(rb.desc)}</p>
              <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">
                <span style="font-size:10px;color:var(--text4);font-family:'Inter',sans-serif">🔎 ${esc(rb.inv)}</span>
                <span style="color:var(--text4);margin:0 4px;opacity:.4">·</span>
                <span style="font-size:10px;color:var(--text4);font-family:'JetBrains Mono',monospace">${rb.steps.length} steps</span>
                <span style="margin:0 4px;color:var(--text4);opacity:.4">·</span>
                ${rb.tags.map(tg=>makeTag(tg,'#a07050',8)).join('')}
              </div>
            </div>
            <span style="color:var(--accent3);font-size:11px;font-weight:600;flex-shrink:0;opacity:.6;margin-top:2px">→</span>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

// ── RUNBOOK DETAIL ────────────────────────────────────────────────────────────
function renderRbDetail(){
  const rb=activeRb;
  const steps=rb.steps.map((step,i)=>{
    const tool=TOOLS.find(x=>x.n.toLowerCase()===step.tool.toLowerCase())||TOOLS.find(x=>x.n.toLowerCase().includes(step.tool.toLowerCase()));
    const cc=tool?catColor(tool.c):'var(--accent)';
    return `<div class="rb-step">
      <div class="step-num" style="border-color:${cc};color:${cc}">${i+1}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px">
          <button ${tool?`data-tool="${esc(tool.n)}"`:''}
            class="mono${tool?' tool-link':''}"
            style="color:${cc};font-weight:600;font-size:12px;background:none;border:none;cursor:${tool?'pointer':'default'};padding:0;text-align:left;letter-spacing:.2px">
            ${esc(step.tool)}
          </button>
          ${tool?`${makeTag(tool.t||'CLI',cc,8)} ${statusBadge(tool.oss)}`:''}
        </div>
        <div style="font-size:12px;font-weight:600;color:var(--text1);margin-bottom:4px;font-family:'Inter',sans-serif">${esc(step.action)}</div>
        <div style="font-size:11px;color:var(--text4);line-height:1.6;font-family:'Inter',sans-serif">💡 ${esc(step.note)}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="rb-breadcrumb">
      <button id="rb-back" style="color:var(--accent3);font-weight:600;font-size:10px;padding:4px 12px;border:1px solid rgba(212,170,112,.3);border-radius:2px;background:rgba(212,170,112,.06);letter-spacing:.5px;text-transform:uppercase;font-family:'Inter',sans-serif">← Runbooks</button>
      <span style="opacity:.3">›</span><span style="font-size:11px">${esc(rb.title)}</span>
    </div>
    <div class="wrap-sm">
      <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border2)">
        <span style="font-size:30px;flex-shrink:0;line-height:1;margin-top:3px">${rb.icon}</span>
        <div>
          <h2 style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--accent3);margin-bottom:8px;letter-spacing:.5px">${esc(rb.title)}</h2>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
            ${rb.tags.map(tg=>makeTag(tg,'#a07050',8)).join('')}
            <span style="font-size:10px;color:var(--text4);display:flex;align-items:center;font-family:'Inter',sans-serif">🔎 ${esc(rb.inv)}</span>
          </div>
          <p style="font-size:12px;color:var(--text4);line-height:1.65;font-family:'Inter',sans-serif">${esc(rb.desc)}</p>
        </div>
      </div>
      ${steps}
    </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(name){
  const t=TOOLS.find(x=>x.n===name);
  if(!t) return;
  const cc=catColor(t.c),cat=CAT[t.c]||{};
  const starred=isStarred(t.n);

  const evTags=t.ev&&t.ev.length
    ? t.ev.map(e=>makeTag(e,'#a07050',8)).join(' ')
    : `<span style="font-size:11px;color:var(--text4);font-family:'Inter',sans-serif">—</span>`;

  document.getElementById('modal').innerHTML=`
    <button class="modal-close" id="mcl">✕</button>
    <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:10px;padding-bottom:14px;border-bottom:1px solid var(--border2)">
      <span style="font-size:24px;flex-shrink:0;line-height:1;margin-top:3px">${cat.i||'🔧'}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:7px">
          <span class="mono" style="font-size:16px;font-weight:600;color:${cc};letter-spacing:.3px">${esc(t.n)}</span>
          ${makeTag(t.t||'CLI',cc,8)}
          ${t.sub?makeTag(t.sub,'#8a7050',8):''}
          ${makeTag(t.c,cc,8)}
          ${statusBadge(t.oss)}
          <button id="modal-star" title="Bookmark" style="font-size:15px;color:${starred?'var(--accent3)':'var(--text4)'};transition:color .15s;padding:0 4px">${starred?'★':'☆'}</button>
        </div>
        ${t.p?`<p style="font-size:12px;color:var(--text3);line-height:1.55;font-family:'Inter',sans-serif">${esc(t.p)}</p>`:''}
      </div>
    </div>
    ${t.s?`<div class="modal-sec"><div class="modal-sec-title" style="color:var(--accent3)">DFIR Scenario</div><p style="font-size:12px;color:var(--text3);line-height:1.7;font-family:'Inter',sans-serif">${esc(t.s)}</p></div>`:''}
    <div class="modal-sec" style="border-color:${hex2rgba(cc,.25)}">
      <div class="modal-sec-title" style="color:${cc}">Quick Reference</div>
      <pre style="font-size:11px;color:#8aaa70;line-height:1.8"># ${esc(t.n)}  [${esc(t.t||'CLI')}]  ${t.oss?'[OSS]':'[COMMERCIAL]'}
# Category : ${esc(t.c)}${t.sub?' / '+esc(t.sub):''}
# Purpose  : ${esc(t.p||'See documentation')}

${t.n.includes(' ')||t.n.includes('/')?'# See official documentation for usage and flags':`${esc(t.n)} --help\nman ${esc(t.n)}`}</pre>
    </div>
    <div class="modal-sec">
      <div class="modal-sec-title" style="color:var(--accent3)">Evidence Types</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${evTags}</div>
    </div>
    <div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:7px">
      <button onclick="goTab('${esc(t.c)}');closeModal()" style="background:${hex2rgba(cc,.1)};color:${cc};border:1px solid ${hex2rgba(cc,.28)};border-radius:2px;padding:5px 14px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;font-family:'Inter',sans-serif">Browse ${esc(t.c)} →</button>
      ${t.sub?`<button onclick="goTabFiltered('${esc(t.c)}','${esc(t.sub)}');closeModal()" style="background:${hex2rgba(cc,.07)};color:${cc};border:1px solid ${hex2rgba(cc,.22)};border-radius:2px;padding:5px 14px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;font-family:'Inter',sans-serif">Filter: ${esc(t.sub)} →</button>`:''}
    </div>`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('mcl').onclick=closeModal;
  document.getElementById('modal-star').onclick=e=>{
    toggleBm(t.n,e);
    const s=document.getElementById('modal-star');
    const now=isStarred(t.n);
    s.textContent=now?'★':'☆'; s.style.color=now?'var(--accent3)':'var(--text4)';
  };
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}

// ── Keyboard navigation ───────────────────────────────────────────────────────
function updateKbdCards(){
  kbdCards=[...document.querySelectorAll('[data-tool]')];
  kbdIdx=-1;
}
function kbdMove(dir){
  if(!kbdCards.length) return;
  if(kbdIdx>=0) kbdCards[kbdIdx].classList.remove('kbd-focused');
  kbdIdx=Math.max(0,Math.min(kbdCards.length-1,kbdIdx+dir));
  const card=kbdCards[kbdIdx];
  card.classList.add('kbd-focused');
  card.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ── Event binding ─────────────────────────────────────────────────────────────
function bindEvents(){
  // Global search
  const gs=document.getElementById('g-search');
  if(gs){gs.addEventListener('input',e=>{gSearch=e.target.value;render()});gs.addEventListener('keydown',e=>{if(e.key==='Escape'){gSearch='';render()}})}
  const cg=document.getElementById('clear-gsearch');
  if(cg) cg.onclick=()=>{gSearch='';render()};

  // Cat nav cards
  document.querySelectorAll('[data-goto]').forEach(el=>el.addEventListener('click',()=>goTab(el.dataset.goto)));

  // Tool cards (click and keyboard)
  document.querySelectorAll('[data-tool]').forEach(el=>{
    el.addEventListener('click',()=>openModal(el.dataset.tool));
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openModal(el.dataset.tool)}});
  });

  // Bookmark stars on cards
  document.querySelectorAll('[data-star]').forEach(btn=>btn.addEventListener('click',e=>toggleBm(btn.dataset.star,e)));

  // Cat search
  const cs=document.getElementById('c-search');
  if(cs) cs.addEventListener('input',e=>{cSearch=e.target.value;render()});

  // Filter chips
  document.querySelectorAll('.filter-chip').forEach(btn=>btn.addEventListener('click',()=>{
    const {ftype,val}=btn.dataset;
    if(ftype==='sub') fSubcat=fSubcat.includes(val)?fSubcat.filter(x=>x!==val):[...fSubcat,val];
    else if(ftype==='type') fType=fType.includes(val)?fType.filter(x=>x!==val):[...fType,val];
    else if(ftype==='ev') fEv=fEv.includes(val)?fEv.filter(x=>x!==val):[...fEv,val];
    render();
  }));

  const clr=document.getElementById('clr-filters');
  if(clr) clr.onclick=()=>{fSubcat=[];fType=[];fEv=[];render()};

  // Runbook cards
  document.querySelectorAll('[data-rb]').forEach(el=>el.addEventListener('click',()=>{
    activeRb=RUNBOOKS.find(r=>r.id===el.dataset.rb)||null;
    buildTabs(); render();
  }));

  // Runbook tool links
  document.querySelectorAll('.tool-link').forEach(btn=>btn.addEventListener('click',()=>{
    if(btn.dataset.tool) openModal(btn.dataset.tool);
  }));

  // Runbook back
  const rb=document.getElementById('rb-back');
  if(rb) rb.onclick=()=>{activeRb=null;render()};
}

// ── Global key handler ────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  const inInput=(tag==='INPUT'||tag==='TEXTAREA');
  const modalOpen=document.getElementById('overlay').classList.contains('open');
  const kbdOpen=document.getElementById('kbd-overlay').style.display!=='none';

  if(e.key==='Escape'){
    if(modalOpen){closeModal();return}
    if(kbdOpen){document.getElementById('kbd-overlay').style.display='none';return}
    if(document.getElementById('bm-panel').classList.contains('open')){document.getElementById('bm-panel').classList.remove('open');return}
    if(inInput){document.activeElement.blur();if(activeTab==='__home__'){gSearch='';render()}return}
  }
  if(modalOpen||kbdOpen) return;
  if(e.key==='/'&&!inInput){e.preventDefault();const s=document.getElementById('g-search')||document.getElementById('c-search');if(s){s.focus();s.select()}}
  if(e.key==='ArrowDown'&&!inInput){e.preventDefault();kbdMove(1)}
  if(e.key==='ArrowUp'&&!inInput){e.preventDefault();kbdMove(-1)}
  if(e.key==='Enter'&&!inInput&&kbdIdx>=0&&kbdCards[kbdIdx]){kbdCards[kbdIdx].click()}
  if(e.key==='s'&&!inInput&&kbdIdx>=0&&kbdCards[kbdIdx]){
    const name=kbdCards[kbdIdx].dataset.tool;
    if(name) toggleBm(name,null);
  }
  if(e.key==='b'&&!inInput){document.getElementById('bm-panel').classList.toggle('open')}
  if(e.key==='t'&&!inInput){applyTheme(theme==='dark'?'light':'dark')}
  if(e.key==='?'&&!inInput){document.getElementById('kbd-overlay').style.display='flex'}
});

// ── Overlay / modal close ─────────────────────────────────────────────────────
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('kbd-overlay').addEventListener('click',function(e){if(e.target===this)this.style.display='none'});
document.getElementById('kbd-close').onclick=()=>{document.getElementById('kbd-overlay').style.display='none'};

// ── Top-bar buttons ───────────────────────────────────────────────────────────
document.getElementById('theme-toggle').onclick=()=>applyTheme(theme==='dark'?'light':'dark');
document.getElementById('kbd-help-btn').onclick=()=>{document.getElementById('kbd-overlay').style.display='flex'};
document.getElementById('bm-toggle').onclick=()=>{document.getElementById('bm-panel').classList.toggle('open');renderBmPanel()};
document.getElementById('bm-close').onclick=()=>document.getElementById('bm-panel').classList.remove('open');
document.getElementById('bm-clear-all').onclick=()=>{bookmarks=[];saveBm();updateBmBadge();renderBmPanel()};

// ── Bootstrap ─────────────────────────────────────────────────────────────────
document.getElementById('stat-tools').textContent=TOOLS.length;
document.getElementById('stat-cats').textContent=ALL_CATS.length;
updateBmBadge();
renderBmPanel();
buildTabs();
render();
</script>
</body>
</html>
