<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0806;color:#e8e0d0;font-family:'JetBrains Mono',monospace;overflow:hidden;width:100vw;height:100vh}
  #graph-container{width:100vw;height:100vh;position:absolute;top:0;left:0}

  /* HUD Panel */
  #hud{
    position:fixed;top:20px;left:20px;z-index:100;
    background:rgba(10,8,6,.88);
    border:1px solid #2e2a24;
    border-left:3px solid #c0392b;
    padding:18px 20px;
    min-width:260px;max-width:300px;
    backdrop-filter:blur(12px);
    box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 0 1px rgba(192,57,43,.08);
  }
  .hud-title{
    font-size:10px;font-weight:700;letter-spacing:4px;color:rgba(192,57,43,.7);
    text-transform:uppercase;margin-bottom:4px;
  }
  .hud-brand{
    font-size:18px;font-weight:700;letter-spacing:2px;color:#e8e0d0;margin-bottom:12px;
    border-bottom:1px solid #2e2a24;padding-bottom:12px;
  }
  .hud-brand em{color:#c0392b;font-style:normal}
  #hud-stats{font-size:10px;color:#7a6e60;line-height:1.9;margin-bottom:12px}
  #hud-stats span{color:#d4aa70;font-weight:600}

  /* Tool detail card */
  #detail{
    border-top:1px solid #2e2a24;padding-top:12px;min-height:80px;
    transition:opacity .2s;
  }
  #detail-icon{font-size:18px;margin-bottom:6px}
  #detail-name{
    font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;
    letter-spacing:.3px;word-break:break-word;
  }
  #detail-cat{
    font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
    margin-bottom:6px;
  }
  #detail-desc{font-size:10px;color:#a09586;line-height:1.65;font-family:'Inter',sans-serif}
  #detail-badge{
    display:inline-block;margin-top:6px;padding:1px 6px;border-radius:1px;
    font-size:8px;font-weight:700;letter-spacing:1px;
    background:rgba(192,57,43,.1);color:#a04030;border:1px solid rgba(192,57,43,.25);
  }

  /* Controls */
  #controls{
    position:fixed;bottom:20px;left:20px;z-index:100;
    font-size:9px;color:#3d3830;letter-spacing:1.5px;text-transform:uppercase;
    line-height:2.2;
  }
  .ctrl-row{display:flex;gap:8px;align-items:center}
  .ctrl-key{
    display:inline-block;padding:1px 6px;border-radius:1px;
    background:rgba(255,255,255,.05);border:1px solid #2e2a24;
    color:#5a5048;font-size:8px;
  }

  /* Legend */
  #legend{
    position:fixed;top:20px;right:20px;z-index:100;
    background:rgba(10,8,6,.88);border:1px solid #2e2a24;
    padding:14px 16px;max-height:calc(100vh - 40px);overflow-y:auto;
    backdrop-filter:blur(12px);
    scrollbar-width:thin;scrollbar-color:#2e2a24 transparent;
  }
  #legend::-webkit-scrollbar{width:3px}
  #legend::-webkit-scrollbar-thumb{background:#2e2a24}
  .legend-title{font-size:9px;font-weight:700;letter-spacing:2px;color:#5a5048;text-transform:uppercase;margin-bottom:10px}
  .legend-item{
    display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer;
    padding:3px 6px;border-radius:2px;transition:background .15s;
  }
  .legend-item:hover{background:rgba(255,255,255,.04)}
  .legend-item.dimmed{opacity:.3}
  .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .legend-label{font-size:10px;color:#a09586;letter-spacing:.3px}
  .legend-count{font-size:9px;color:#3d3830;margin-left:auto;font-family:'JetBrains Mono',monospace}

  /* Back link */
  #back-btn{
    position:fixed;bottom:20px;right:20px;z-index:100;
    font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
    padding:8px 16px;border:1px solid rgba(192,57,43,.35);
    background:rgba(192,57,43,.08);color:rgba(192,57,43,.7);
    cursor:pointer;text-decoration:none;display:block;
    transition:background .15s,color .15s;
  }
  #back-btn:hover{background:rgba(192,57,43,.16);color:#c0392b}

  /* Search */
  #search-wrap{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;
    background:rgba(10,8,6,.9);border:1px solid #2e2a24;
    padding:8px 14px;display:flex;align-items:center;gap:8px;
    backdrop-filter:blur(12px);
  }
  #search-wrap span{color:#5a5048;font-size:12px}
  #nebula-search{
    background:none;border:none;color:#e8e0d0;font-size:12px;
    font-family:'JetBrains Mono',monospace;width:200px;outline:none;
  }
  #nebula-search::placeholder{color:#3d3830}

  /* Loading */
  #loading{
    position:fixed;inset:0;background:#0a0806;z-index:200;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  }
  .load-title{font-size:11px;letter-spacing:4px;color:rgba(192,57,43,.6);text-transform:uppercase}
  .load-bar{width:200px;height:1px;background:#1a1410;overflow:hidden}
  .load-fill{height:100%;background:linear-gradient(90deg,#c0392b,#e07b39);animation:loadAnim 1.5s ease infinite}
  @keyframes loadAnim{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
</style>

/* ── Build graph data ─────────────────────────────────────────────────── */
const catKeys = Object.keys(CAT);
let hiddenCats = new Set();
let searchQuery = '';

function buildGraphData() {
  const nodes = [];
  const links = [];

  // Core node
  nodes.push({ id: '__CORE__', name: 'TSURUGI', group: '__core__', val: 30, color: '#ffffff', type: 'core' });

  // Category hubs
  catKeys.forEach(key => {
    const m = CAT[key];
    const count = TOOLS.filter(t => t.c === key).length;
    nodes.push({
      id: '__CAT__' + key,
      name: key,
      desc: m.d,
      icon: m.i,
      group: key,
      val: 14,
      color: m.c,
      type: 'cat',
      count
    });
    links.push({ source: '__CORE__', target: '__CAT__' + key, color: m.c + '22', width: 1.5 });
  });

  // Tools
  const ql = searchQuery.toLowerCase().trim();
  TOOLS.forEach((t, idx) => {
    const m = CAT[t.c];
    const color = m ? m.c : '#888';
    const hidden = hiddenCats.has(t.c);
    const searchHide = ql && !t.n.toLowerCase().includes(ql) && !t.p.toLowerCase().includes(ql) && !t.c.toLowerCase().includes(ql);
    nodes.push({
      id: t.n + '__' + idx,
      name: t.n,
      desc: t.p,
      icon: m ? m.i : '🔧',
      group: t.c,
      val: 3,
      color: (hidden || searchHide) ? '#1a1410' : color,
      type: 'tool',
      oss: t.oss,
      toolType: t.t,
      hidden: hidden || searchHide,
      toolRef: t
    });
    links.push({
      source: '__CAT__' + t.c,
      target: t.n + '__' + idx,
      color: (hidden || searchHide) ? '#111' : (color + '55'),
      width: 0.5
    });
  });

  return { nodes, links };
}

/* ── Init ─────────────────────────────────────────────────────────────── */
window.addEventListener('load', () => {
  // Legend
  const legendEl = document.getElementById('legend-items');
  catKeys.forEach(key => {
    const m = CAT[key];
    const count = TOOLS.filter(t => t.c === key).length;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cat = key;
    item.innerHTML = `
      <div class="legend-dot" style="background:${m.c}"></div>
      <span class="legend-label">${m.i} ${key}</span>
      <span class="legend-count">${count}</span>
    `;
    item.addEventListener('click', () => toggleCat(key, item));
    legendEl.appendChild(item);
  });

  // Stats
  document.getElementById('stat-t').textContent = TOOLS.length;
  document.getElementById('stat-c').textContent = catKeys.length;
  document.getElementById('stat-v').textContent = TOOLS.length;

  // Build graph
  const gd = buildGraphData();

  const Graph = ForceGraph3D()
    (document.getElementById('graph-container'))
    .graphData(gd)
    .backgroundColor('#0a0806')
    .showNavInfo(false)
    .nodeLabel(node => node.name)
    .nodeColor(node => node.color)
    .nodeVal(node => node.val)
    .nodeOpacity(0.92)
    .nodeResolution(node => node.type === 'core' ? 16 : node.type === 'cat' ? 12 : 6)
    .linkWidth(link => link.width || 0.5)
    .linkColor(link => link.color || '#2e2a24')
    .linkOpacity(0.6)
    .linkDirectionalParticles(link => link.width > 1 ? 2 : 0)
    .linkDirectionalParticleWidth(1.2)
    .linkDirectionalParticleColor(link => link.color)
    .onNodeHover(node => {
      document.body.style.cursor = node ? 'pointer' : 'default';
      if (!node) return;
      if (node.type === 'tool') {
        const m = CAT[node.group];
        document.getElementById('detail-icon').textContent = node.icon;
        document.getElementById('detail-name').textContent = node.name;
        document.getElementById('detail-cat').textContent = node.group;
        document.getElementById('detail-cat').style.color = m ? m.c : '#888';
        document.getElementById('detail-desc').textContent = node.desc || '—';
        document.getElementById('detail-badge').textContent = node.oss ? 'OSS' : 'COMMERCIAL';
        document.getElementById('detail-badge').style.display = 'inline-block';
      } else if (node.type === 'cat') {
        document.getElementById('detail-icon').textContent = node.icon;
        document.getElementById('detail-name').textContent = node.name;
        document.getElementById('detail-cat').textContent = node.count + ' tools';
        document.getElementById('detail-cat').style.color = node.color;
        document.getElementById('detail-desc').textContent = node.desc || '';
        document.getElementById('detail-badge').style.display = 'none';
      } else if (node.type === 'core') {
        document.getElementById('detail-icon').textContent = '🌌';
        document.getElementById('detail-name').textContent = 'TSURUGI';
        document.getElementById('detail-cat').textContent = 'LAB 2024.1';
        document.getElementById('detail-cat').style.color = '#c0392b';
        document.getElementById('detail-desc').textContent = `${TOOLS.length} tools across ${catKeys.length} categories`;
        document.getElementById('detail-badge').style.display = 'none';
      }
    })
    .onNodeClick(node => {
      const dist = 80;
      const distRatio = 1 + dist / Math.hypot(node.x || 1, node.y || 1, node.z || 1);
      Graph.cameraPosition(
        { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
        node,
        1800
      );
    })
    .onBackgroundClick(() => {
      Graph.cameraPosition({ x: 0, y: 0, z: 400 }, { x: 0, y: 0, z: 0 }, 1500);
    });

  // Tweak forces for better layout
  Graph.d3Force('charge').strength(-60);
  Graph.d3Force('link').distance(link => {
    if (link.width > 1) return 80;  // core → cat
    return 35;                       // cat → tool
  });

  // Store graph reference
  window._graph = Graph;

  // Hide loader
  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 400);
  }, 1200);

  // Search
  document.getElementById('nebula-search').addEventListener('input', e => {
    searchQuery = e.target.value;
    updateGraph();
    const vis = searchQuery
      ? TOOLS.filter(t => t.n.toLowerCase().includes(searchQuery.toLowerCase()) || t.p.toLowerCase().includes(searchQuery.toLowerCase())).length
      : TOOLS.length - [...hiddenCats].reduce((a, c) => a + TOOLS.filter(t => t.c === c).length, 0);
    document.getElementById('stat-v').textContent = vis;
  });

  function toggleCat(key, itemEl) {
    if (hiddenCats.has(key)) hiddenCats.delete(key);
    else hiddenCats.add(key);
    itemEl.classList.toggle('dimmed', hiddenCats.has(key));
    updateGraph();
    const vis = TOOLS.length - [...hiddenCats].reduce((a, c) => a + TOOLS.filter(t => t.c === c).length, 0);
    document.getElementById('stat-v').textContent = vis;
  }

  function updateGraph() {
    const gd = buildGraphData();
    Graph.graphData(gd);
  }
});
