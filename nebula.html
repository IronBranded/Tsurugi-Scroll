<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tsurugi Nebula | 3D Tool Map</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <style>
        body { margin: 0; background: #0e0c0b; color: #e8e0d0; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        #overlay { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .hud { background: rgba(14, 12, 11, 0.9); border-left: 4px solid #c0392b; padding: 20px; backdrop-filter: blur(10px); pointer-events: all; border: 1px solid #2e2a24; min-width: 250px; }
        h1 { margin: 0; font-size: 16px; color: #c0392b; text-transform: uppercase; letter-spacing: 4px; }
        #status { font-size: 11px; color: #7a6e60; margin: 8px 0; }
        #detail-box { margin-top: 15px; border-top: 1px solid #2e2a24; pt: 15px; }
        .t-name { color: #fff; font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }
        .t-desc { color: #a09586; font-size: 12px; line-height: 1.5; }
        .hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #444; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="hud">
            <h1>Nebula</h1>
            <div id="status">Syncing with Scroll data...</div>
            <div id="detail-box">
                <span class="t-name">System Offline</span>
                <span class="t-desc">Select a node to begin inspection.</span>
            </div>
        </div>
    </div>
    <div class="hint">Rotate: Left Click | Pan: Right Click | Zoom: Scroll</div>
    <div id="3d-graph"></div>

    <script>
        const graphData = { nodes: [], links: [] };

        async function launchNebula() {
            try {
                // Fetch your index.html to extract the tool database
                const response = await fetch('index.html');
                const text = await response.text();

                // Regex to extract the CAT and TOOLS objects from your script
                const catMatch = text.match(/const CAT\s*=\s*({[\s\S]*?});/);
                const toolsMatch = text.match(/const TOOLS\s*=\s*(\[[\s\S]*?\]);/);

                if (!catMatch || !toolsMatch) throw new Error("Data extraction failed");

                // Parsing the strings into objects
                const CAT = eval('(' + catMatch[1] + ')');
                const TOOLS = eval('(' + toolsMatch[1] + ')');

                document.getElementById('status').innerText = `Nodes: ${TOOLS.length + Object.keys(CAT).length} | Origin: Tsurugi 2024.1`;

                // 1. Central Core
                graphData.nodes.push({ id: 'CORE', name: 'TSURUGI', color: '#ffffff', val: 25, type: 'root' });

                // 2. Category Hubs
                Object.keys(CAT).forEach(key => {
                    const c = CAT[key];
                    graphData.nodes.push({ 
                        id: key, 
                        name: `${c.i} ${key}`, 
                        color: c.c, 
                        val: 12, 
                        type: 'hub' 
                    });
                    graphData.links.push({ source: 'CORE', target: key, color: '#2e2a24' });
                });

                // 3. Individual Tools
                TOOLS.forEach(t => {
                    const catColor = CAT[t.c] ? CAT[t.c].c : '#3498db';
                    graphData.nodes.push({
                        id: t.n,
                        name: t.n,
                        desc: t.p || t.s || 'No description available',
                        color: catColor,
                        val: 3,
                        type: 'tool'
                    });
                    graphData.links.push({ source: t.c, target: t.n, color: catColor + '33' });
                });

                const Graph = ForceGraph3D()(document.getElementById('3d-graph'))
                    .graphData(graphData)
                    .backgroundColor('#0e0c0b')
                    .nodeLabel('name')
                    .nodeColor(node => node.color)
                    .nodeVal(node => node.val)
                    .linkWidth(0.5)
                    .linkOpacity(0.3)
                    .onNodeHover(node => {
                        if (node && node.type === 'tool') {
                            document.querySelector('.t-name').innerText = node.name;
                            document.querySelector('.t-desc').innerText = node.desc;
                        }
                    })
                    .onNodeClick(node => {
                        const distance = 120;
                        const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                        Graph.cameraPosition(
                            { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
                            node, 
                            2500
                        );
                    });

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Critical: Data link broken.";
            }
        }

        launchNebula();
    </script>
</body>
</html>
